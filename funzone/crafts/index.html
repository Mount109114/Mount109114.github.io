<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Origami, Kirigami & Puzzles | Muntasir</title>

<style>
:root {
  --bg:#071225;
  --bg2:#0c1830;
  --text:#eef3ff;
  --muted:#b8c4e0;
  --accent:#9cc0ff;
  --panel:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.12);
  --shadow:0 18px 50px rgba(0,0,0,0.28);
}

* { box-sizing:border-box; }

html, body {
  margin:0;
  min-height:100%;
  font-family:Arial, Helvetica, sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top left, rgba(112,160,255,0.16), transparent 28%),
    radial-gradient(circle at bottom right, rgba(196,220,255,0.10), transparent 25%),
    linear-gradient(135deg, var(--bg), var(--bg2));
}

body::before, body::after {
  content:"";
  position:fixed;
  width:320px;
  height:320px;
  border-radius:50%;
  filter:blur(110px);
  opacity:.28;
  z-index:0;
  pointer-events:none;
}
body::before { top:-90px; left:-70px; background:#5f8dff; }
body::after { right:-80px; bottom:-110px; background:#9dc0ff; }

.page {
  position:relative;
  z-index:1;
  min-height:100vh;
  padding:28px;
  display:grid;
  grid-template-columns: 430px 1fr;
  gap:28px;
}

.hero {
  align-self:center;
  padding:24px;
}

.eyebrow {
  display:inline-block;
  padding:8px 14px;
  border-radius:999px;
  background:rgba(255,255,255,0.08);
  border:1px solid var(--border);
  color:var(--accent);
  font-weight:700;
  margin-bottom:16px;
}

h1 {
  font-size:clamp(2.6rem, 6vw, 5.2rem);
  line-height:1.02;
  letter-spacing:-0.04em;
  margin:0 0 16px;
}

.hero p {
  color:var(--muted);
  line-height:1.7;
  font-size:1.05rem;
}

.hero-links {
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  margin-top:20px;
}

.btn {
  padding:12px 18px;
  border-radius:14px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.16);
  color:var(--text);
  text-decoration:none;
  font-weight:700;
}

.gallery-wrap {
  align-self:center;
  min-width:0;
}

.topbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:14px;
  margin-bottom:16px;
}

.tabs {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.tab {
  border:1px solid var(--border);
  background:rgba(255,255,255,0.06);
  color:var(--text);
  border-radius:999px;
  padding:10px 16px;
  cursor:pointer;
  font-weight:700;
}

.tab.active {
  background:linear-gradient(135deg,#8fb4ff,#d6e5ff);
  color:#071225;
}

.count {
  color:var(--muted);
  font-size:.9rem;
}

.carousel {
  position:relative;
  min-height:640px;
  border-radius:28px;
  background:var(--panel);
  border:1px solid var(--border);
  backdrop-filter:blur(16px);
  box-shadow:var(--shadow);
  overflow:hidden;
  padding:22px;
}

.feature {
  height:620px;
  border-radius:22px;
  overflow:hidden;
  background:rgba(0,0,0,0.18);
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

.feature img {
  max-width:95%;
  max-height:95%;
  object-fit:contain;
  border-radius:18px;
  animation:pop .35s ease;
}

@keyframes pop {
  from { opacity:0; transform:scale(.96); }
  to { opacity:1; transform:scale(1); }
}

.nav {
  position:absolute;
  top:220px;
  transform:translateY(-50%);
  width:44px;
  height:44px;
  border-radius:50%;
  border:1px solid var(--border);
  background:rgba(7,18,37,0.65);
  color:var(--text);
  font-size:1.6rem;
  cursor:pointer;
  backdrop-filter:blur(12px);
}

.prev { left:34px; }
.next { right:34px; }

.meta {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:16px 4px;
  color:var(--muted);
}

.meta strong { color:var(--text); }

.thumbs {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(88px, 1fr));
  gap:10px;
  max-height:145px;
  overflow-y:auto;
  padding-right:4px;
}

.thumbs img {
  width:100%;
  height:78px;
  object-fit:cover;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.10);
  opacity:.65;
  cursor:pointer;
  transition:.18s;
}

.thumbs img:hover,
.thumbs img.active {
  opacity:1;
  transform:translateY(-2px);
  border-color:rgba(156,192,255,.5);
}

.thumbs::-webkit-scrollbar { width:8px; }
.thumbs::-webkit-scrollbar-thumb {
  background:rgba(156,192,255,.22);
  border-radius:999px;
}

.empty {
  color:var(--muted);
  text-align:center;
  padding:80px 20px;
}

@media (max-width:1000px) {
  .page {
    grid-template-columns:1fr;
  }
  .carousel {
    min-height:560px;
  }
  .feature {
    height:340px;
  }
}
</style>
</head>

<body>
<div class="page">
  <section class="hero">
    <div class="eyebrow">Fun Zone · Handmade Works</div>
    <h1>Origami, kirigami & crafted puzzles.</h1>
    <p>
      A small visual gallery of paper-folding, cutting patterns, geometric experiments,
      and puzzles I crafted by hand.
    </p>

    <div class="hero-links">
      <a class="btn" href="../../index.html">← Back to main site</a>
      <a class="btn" href="../lorenz/">→ Lorenz Playground</a>
    </div>
  </section>

  <main class="gallery-wrap">
    <div class="topbar">
      <div class="tabs">
        <button class="tab active" data-gallery="origami">Origami / Kirigami</button>
        <button class="tab" data-gallery="puzzles">Puzzles</button>
      </div>
      <div class="count" id="countText">Loading...</div>
    </div>

    <section class="carousel">
      <button class="nav prev" id="prevBtn">‹</button>
      <button class="nav next" id="nextBtn">›</button>

      <div class="feature" id="featureBox">
        <div class="empty">Loading images...</div>
      </div>

      <div class="meta">
        <strong id="titleText">Gallery</strong>
        <span id="indexText">0 / 0</span>
      </div>

      <div class="thumbs" id="thumbs"></div>
    </section>
  </main>
</div>

<script>
const galleries = {
  origami: {
    title: "Origami / Kirigami",
    folder: "../../assets/Origami/",
    prefix: "Origami_jpg_",
    start: 1,
    end: 80
  },
  puzzles: {
    title: "Puzzles",
    folder: "../../assets/Puzzles/",
    prefix: "Puzzles_jpg_",
    start: 1,
    end: 80
  }
};

let currentGallery = "origami";
let images = [];
let currentIndex = 0;

const featureBox = document.getElementById("featureBox");
const thumbs = document.getElementById("thumbs");
const titleText = document.getElementById("titleText");
const indexText = document.getElementById("indexText");
const countText = document.getElementById("countText");

function imageExists(src) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => resolve(src);
    img.onerror = () => resolve(null);
    img.src = src;
  });
}

async function loadGallery(name) {
  currentGallery = name;
  currentIndex = 0;
  images = [];

  featureBox.innerHTML = `<div class="empty">Scanning gallery...</div>`;
  thumbs.innerHTML = "";
  countText.textContent = "Loading...";

  const g = galleries[name];
  const checks = [];

  for (let i = g.start; i <= g.end; i++) {
    checks.push(imageExists(`${g.folder}${g.prefix}${i}.jpg`));
  }

  const results = await Promise.all(checks);
  images = results.filter(Boolean);

  renderGallery();
}

function renderGallery() {
  const g = galleries[currentGallery];
  titleText.textContent = g.title;
  countText.textContent = `${images.length} images`;

  document.querySelectorAll(".tab").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.gallery === currentGallery);
  });

  if (!images.length) {
    featureBox.innerHTML = `<div class="empty">No images found.</div>`;
    indexText.textContent = "0 / 0";
    return;
  }

  showImage(0);
  renderThumbs();
}

function showImage(index) {
  if (!images.length) return;

  currentIndex = (index + images.length) % images.length;

  featureBox.innerHTML = `
    <img src="${images[currentIndex]}" alt="${galleries[currentGallery].title} image">
  `;

  indexText.textContent = `${currentIndex + 1} / ${images.length}`;

  document.querySelectorAll(".thumbs img").forEach((img, i) => {
    img.classList.toggle("active", i === currentIndex);
  });
}

function renderThumbs() {
  thumbs.innerHTML = "";

  images.forEach((src, i) => {
    const img = document.createElement("img");
    img.src = src;
    img.alt = `thumbnail ${i + 1}`;
    img.addEventListener("click", () => showImage(i));
    thumbs.appendChild(img);
  });
}

document.getElementById("prevBtn").addEventListener("click", () => {
  showImage(currentIndex - 1);
});

document.getElementById("nextBtn").addEventListener("click", () => {
  showImage(currentIndex + 1);
});

document.querySelectorAll(".tab").forEach(btn => {
  btn.addEventListener("click", () => loadGallery(btn.dataset.gallery));
});

document.addEventListener("keydown", e => {
  if (e.key === "ArrowLeft") showImage(currentIndex - 1);
  if (e.key === "ArrowRight") showImage(currentIndex + 1);
});

// Auto-slide
setInterval(() => {
  if (images.length > 1) showImage(currentIndex + 1);
}, 4500);

loadGallery("origami");
</script>
</body>
</html>
