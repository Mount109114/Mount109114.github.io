<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lorenz Attractor | Muntasir's Fun Lab</title>
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --bg: #071225;
    --bg2: #0c1830;
    --panel: rgba(255,255,255,0.07);
    --panel-strong: rgba(255,255,255,0.09);
    --border: rgba(255,255,255,0.12);
    --text: #eef3ff;
    --muted: #b8c4e0;
    --accent: #9cc0ff;
    --accent2: #dce8ff;
    --shadow: 0 18px 50px rgba(0,0,0,0.28);
    --shadow-soft: 0 10px 28px rgba(0,0,0,0.18);
  }

  html, body {
    width: 100%;
    height: 100%;
    background:
      radial-gradient(circle at top left, rgba(112,160,255,0.16), transparent 28%),
      radial-gradient(circle at bottom right, rgba(196,220,255,0.10), transparent 25%),
      linear-gradient(135deg, var(--bg), var(--bg2));
    color: var(--text);
    font-family: Arial, Helvetica, sans-serif;
    overflow: hidden;
  }

  body::before,
  body::after {
    content: "";
    position: fixed;
    width: 320px;
    height: 320px;
    border-radius: 50%;
    filter: blur(110px);
    opacity: 0.30;
    z-index: 0;
    pointer-events: none;
  }

  body::before {
    top: -90px;
    left: -70px;
    background: #5f8dff;
  }

  body::after {
    right: -80px;
    bottom: -110px;
    background: #9dc0ff;
  }

  canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    cursor: grab;
    z-index: 1;
  }

  canvas:active {
    cursor: grabbing;
  }

  header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 10;
    padding: 16px 24px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    background: rgba(7,18,37,0.58);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  header .logo {
    color: var(--text);
    text-decoration: none;
    font-weight: 700;
    letter-spacing: 0.02em;
    font-size: 1.05rem;
    padding: 12px 16px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.10);
    background: rgba(255,255,255,0.04);
    transition: transform 0.18s ease, background 0.18s ease;
  }

  header .logo:hover {
    transform: translateY(-2px);
    background: rgba(255,255,255,0.07);
  }

  header .title-block {
    text-align: right;
    max-width: 720px;
  }

  header h1 {
    font-weight: 700;
    font-size: 1.55rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text);
    opacity: 0.97;
    margin-bottom: 4px;
  }

  header p {
    font-size: 0.86rem;
    color: var(--muted);
    letter-spacing: 0.04em;
    line-height: 1.5;
  }

  #hint {
    position: fixed;
    top: 94px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 9;
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    opacity: 1;
    transition: opacity 1.5s;
    pointer-events: none;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    padding: 10px 16px;
    border-radius: 999px;
  }

  #hint.hide {
    opacity: 0;
  }

  #stats {
    position: fixed;
    top: 92px;
    right: 24px;
    z-index: 9;
    font-size: 0.88rem;
    line-height: 1.7;
    color: var(--muted);
    letter-spacing: 0.03em;
    text-align: right;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(14px);
    padding: 14px 16px;
    border-radius: 20px;
    min-width: 160px;
  }

  #stats span {
    color: var(--accent);
    font-weight: 700;
  }

  #panel {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    background: var(--panel);
    border: 1px solid var(--border);
    backdrop-filter: blur(18px);
    border-radius: 26px;
    padding: 22px 24px 20px;
    width: min(96vw, 900px);
    box-shadow: var(--shadow);
  }

  .panel-row {
    display: flex;
    gap: 16px;
    align-items: flex-end;
    flex-wrap: wrap;
  }

  .ctrl {
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
    min-width: 110px;
  }

  .ctrl label {
    font-size: 0.82rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--muted);
    line-height: 1.45;
  }

  .ctrl .val {
    color: var(--accent);
    font-weight: 700;
    margin-left: 8px;
    font-size: 0.9rem;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.12);
    border-radius: 999px;
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 15px;
    height: 15px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px rgba(156,192,255,0.28);
    cursor: pointer;
    transition: transform 0.15s;
  }

  input[type=range]:hover::-webkit-slider-thumb {
    transform: scale(1.18);
  }

  select {
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: Arial, Helvetica, sans-serif;
    font-size: 0.92rem;
    padding: 10px 12px;
    border-radius: 12px;
    outline: none;
    cursor: pointer;
    width: 100%;
  }

  select option {
    background: #0d1220;
  }

  .divider {
    width: 1px;
    height: 60px;
    background: rgba(255,255,255,0.10);
    align-self: center;
    flex: 0;
    min-width: 1px;
  }

  .btn-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-width: 110px;
  }

  button {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 0.84rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 14px;
    padding: 11px 16px;
    cursor: pointer;
    transition: all 0.18s ease;
    background: rgba(255,255,255,0.05);
    color: var(--text);
  }

  button:hover {
    background: rgba(255,255,255,0.10);
    border-color: rgba(255,255,255,0.20);
    transform: translateY(-2px);
    box-shadow: var(--shadow-soft);
  }

  #btnStart {
    background: linear-gradient(135deg, #8fb4ff, #d6e5ff);
    color: #071225;
    border-color: transparent;
  }

  #btnStart.running {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.16);
    color: var(--accent2);
  }

  @media (max-width: 1000px) {
    #panel {
      width: min(98vw, 98vw);
      bottom: 14px;
      padding: 18px;
    }

    .divider {
      display: none;
    }

    .ctrl {
      min-width: 130px;
    }
  }

  @media (max-width: 900px) {
    html, body {
      overflow: auto;
    }

    header {
      padding: 14px 16px;
      flex-direction: column;
      gap: 12px;
      align-items: stretch;
    }

    header .title-block {
      text-align: left;
    }

    header h1 {
      font-size: 1.25rem;
    }

    header p {
      font-size: 0.8rem;
    }

    #hint {
      top: 124px;
      font-size: 0.72rem;
      max-width: calc(100% - 24px);
      text-align: center;
    }

    #stats {
      top: auto;
      bottom: 220px;
      right: 14px;
      font-size: 0.8rem;
    }
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="../../index.html">← Main Site</a>
  <div class="title-block">
    <h1>Lorenz Attractor</h1>
    <p>Fun Zone · Interactive Dynamical Systems . Chaos Theory · Butterfly Effect</p>
  </div>
</header>

<div id="hint">drag to rotate &nbsp;·&nbsp; scroll to zoom</div>

<div id="stats">
  σ <span id="sv">10.0</span> &nbsp; ρ <span id="rv">28.0</span> &nbsp; β <span id="bv">2.67</span><br>
  pts <span id="pv">0</span>
</div>

<canvas id="c"></canvas>

<div id="panel">
  <div class="panel-row">

    <div class="ctrl">
      <label>σ Sigma <span class="val" id="sigmaVal">10.0</span></label>
      <input type="range" id="sigma" min="1" max="20" step="0.1" value="10"/>
    </div>

    <div class="ctrl">
      <label>ρ Rho <span class="val" id="rhoVal">28.0</span></label>
      <input type="range" id="rho" min="10" max="50" step="0.5" value="28"/>
    </div>

    <div class="ctrl">
      <label>β Beta <span class="val" id="betaVal">2.67</span></label>
      <input type="range" id="beta" min="0.5" max="6" step="0.01" value="2.667"/>
    </div>

    <div class="divider"></div>

    <div class="ctrl">
      <label>Speed <span class="val" id="speedVal">1.0×</span></label>
      <input type="range" id="speed" min="0.1" max="4" step="0.1" value="1"/>
    </div>

    <div class="ctrl">
      <label>Trail <span class="val" id="trailVal">4000</span></label>
      <input type="range" id="trail" min="200" max="10000" step="100" value="4000"/>
    </div>

    <div class="ctrl">
      <label>Color Mode</label>
      <select id="colorMode">
        <option value="velocity">Velocity</option>
        <option value="height">Height</option>
        <option value="hueshift">Hue Shift</option>
        <option value="mono">Monochrome</option>
      </select>
    </div>

    <div class="divider"></div>

    <div class="btn-group">
      <button id="btnStart" class="running">⏸ Pause</button>
      <button id="btnReset">↺ Reset</button>
    </div>

  </div>
</div>

<script>
// ── canvas setup ──
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── Lorenz params ──
let sigma = 10, rho = 28, beta = 8/3;
let speed = 1;
let maxPts = 4000;
let colorMode = 'velocity';
let running = true;

// ── state ──
let points = [];  // {x,y,z}
let x = 0.1, y = 0, z = 0;
const dt = 0.005;

// ── camera ──
let rotX = 0.3, rotY = -0.4;
let zoom = 9;
let dragging = false, lastMX = 0, lastMY = 0;
let autoRotate = true;

// ── hue state ──
let hueOffset = 0;

// ── project 3D → 2D ──
function project(px, py, pz) {
  // rotate around Y
  const cosY = Math.cos(rotY), sinY = Math.sin(rotY);
  const x1 = px * cosY - pz * sinY;
  const z1 = px * sinY + pz * cosY;
  // rotate around X
  const cosX = Math.cos(rotX), sinX = Math.sin(rotX);
  const y2 = py * cosX - z1 * sinX;
  const z2 = py * sinX + z1 * cosX;
  const fov = 600;
  const d = fov / (fov + z2 * zoom * 0.5);
  return {
    sx: canvas.width / 2 + x1 * zoom * d,
    sy: canvas.height / 2 + y2 * zoom * d,
    depth: z2
  };
}

// ── color functions ──
function velColor(i) {
  if (i < 1 || i >= points.length) return `rgba(126,184,247,0.5)`;
  const a = points[i-1], b = points[i];
  const dx = b.x-a.x, dy = b.y-a.y, dz = b.z-a.z;
  const v = Math.sqrt(dx*dx+dy*dy+dz*dz) * 80;
  const t = Math.min(v, 1);
  const r = Math.round(126 + t*(247-126));
  const g = Math.round(184 + t*(100-184));
  const bl = Math.round(247 + t*(80-247));
  return `rgb(${r},${g},${bl})`;
}

function heightColor(i) {
  const z = points[i].z;
  const t = (z + 30) / 65;
  const h = 200 + t * 160;
  return `hsl(${h},80%,65%)`;
}

function hueshiftColor(i) {
  const h = (hueOffset + i * 0.05) % 360;
  return `hsl(${h},80%,65%)`;
}

function monoColor(i, alpha) {
  const a = alpha !== undefined ? alpha : 0.7;
  return `rgba(220,230,255,${a})`;
}

function getColor(i, alpha) {
  if (colorMode === 'velocity') return velColor(i);
  if (colorMode === 'height') return heightColor(i);
  if (colorMode === 'hueshift') return hueshiftColor(i);
  return monoColor(i, alpha);
}

// ── step Lorenz ──
function stepLorenz(steps) {
  for (let s = 0; s < steps; s++) {
    const dx = sigma * (y - x);
    const dy = x * (rho - z) - y;
    const dz = x * y - beta * z;
    x += dx * dt;
    y += dy * dt;
    z += dz * dt;
    points.push({x, y, z});
    if (points.length > maxPts) points.shift();
  }
}

// ── draw ──
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (points.length < 2) return;

  const n = points.length;

  // draw trail segments
  for (let i = 1; i < n; i++) {
    const age = i / n;
    const alpha = Math.pow(age, 0.6) * 0.85;
    const a = project(points[i-1].x, points[i-1].y, points[i-1].z);
    const b = project(points[i].x, points[i].y, points[i].z);

    ctx.beginPath();
    ctx.moveTo(a.sx, a.sy);
    ctx.lineTo(b.sx, b.sy);

    const lw = 0.6 + age * 1.2;
    ctx.lineWidth = lw;

    const col = getColor(i, alpha);
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = col;
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // glowing head dot
  const head = points[n-1];
  const hp = project(head.x, head.y, head.z);
  const grad = ctx.createRadialGradient(hp.sx, hp.sy, 0, hp.sx, hp.sy, 10);
  grad.addColorStop(0, 'rgba(255,255,255,0.95)');
  grad.addColorStop(0.3, 'rgba(180,220,255,0.6)');
  grad.addColorStop(1, 'rgba(126,184,247,0)');
  ctx.beginPath();
  ctx.arc(hp.sx, hp.sy, 10, 0, Math.PI*2);
  ctx.fillStyle = grad;
  ctx.fill();

  // solid dot center
  ctx.beginPath();
  ctx.arc(hp.sx, hp.sy, 2.5, 0, Math.PI*2);
  ctx.fillStyle = '#fff';
  ctx.fill();
}

// ── animation loop ──
let last = performance.now();
function loop(now) {
  requestAnimationFrame(loop);
  const dt_frame = Math.min((now - last) / 1000, 0.05);
  last = now;

  if (running) {
    const steps = Math.round(speed * 3);
    stepLorenz(steps);
    hueOffset += 0.3 * speed;
  }

  if (autoRotate && !dragging) {
    rotY += 0.002;
  }

  draw();
  updateStats();
}

function updateStats() {
  document.getElementById('sv').textContent = sigma.toFixed(1);
  document.getElementById('rv').textContent = rho.toFixed(1);
  document.getElementById('bv').textContent = beta.toFixed(2);
  document.getElementById('pv').textContent = points.length;
}

requestAnimationFrame(loop);

// ── controls ──
function bind(id, valId, suffix, cb) {
  const el = document.getElementById(id);
  const vEl = document.getElementById(valId);
  el.addEventListener('input', () => {
    vEl.textContent = parseFloat(el.value).toFixed(2).replace(/\.?0+$/, '') + (suffix||'');
    cb(parseFloat(el.value));
  });
}

bind('sigma', 'sigmaVal', '', v => { sigma = v; reset(); });
bind('rho',   'rhoVal',   '', v => { rho = v;   reset(); });
bind('beta',  'betaVal',  '', v => { beta = v;  reset(); });
bind('speed', 'speedVal', '×', v => speed = v);
bind('trail', 'trailVal', '', v => { maxPts = v; });

document.getElementById('colorMode').addEventListener('change', e => {
  colorMode = e.target.value;
});

const btnStart = document.getElementById('btnStart');
btnStart.addEventListener('click', () => {
  running = !running;
  btnStart.textContent = running ? '⏸ Pause' : '▶ Start';
  btnStart.classList.toggle('running', running);
});

document.getElementById('btnReset').addEventListener('click', reset);

function reset() {
  points = [];
  x = 0.1 + (Math.random()-0.5)*0.01;
  y = 0;
  z = 0;
}

// ── mouse drag ──
canvas.addEventListener('mousedown', e => {
  dragging = true; autoRotate = false;
  lastMX = e.clientX; lastMY = e.clientY;
});
window.addEventListener('mouseup', () => { dragging = false; });
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  rotY += (e.clientX - lastMX) * 0.007;
  rotX += (e.clientY - lastMY) * 0.007;
  lastMX = e.clientX; lastMY = e.clientY;
});

// ── touch drag ──
canvas.addEventListener('touchstart', e => {
  dragging = true; autoRotate = false;
  lastMX = e.touches[0].clientX; lastMY = e.touches[0].clientY;
}, {passive: true});
window.addEventListener('touchend', () => { dragging = false; });
window.addEventListener('touchmove', e => {
  if (!dragging) return;
  rotY += (e.touches[0].clientX - lastMX) * 0.007;
  rotX += (e.touches[0].clientY - lastMY) * 0.007;
  lastMX = e.touches[0].clientX; lastMY = e.touches[0].clientY;
}, {passive: true});

// ── scroll zoom ──
canvas.addEventListener('wheel', e => {
  zoom *= e.deltaY > 0 ? 0.93 : 1.07;
  zoom = Math.max(3, Math.min(30, zoom));
  e.preventDefault();
}, {passive: false});

// ── hide hint after 4s ──
setTimeout(() => document.getElementById('hint').classList.add('hide'), 4000);

// ── double click to re-enable auto-rotate ──
canvas.addEventListener('dblclick', () => { autoRotate = true; });
</script>
</body>
</html>
