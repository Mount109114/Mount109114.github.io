<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lorenz Attractor | Muntasir's Fun Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #050810;
    --panel: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.09);
    --accent: #7eb8f7;
    --accent2: #f7c97e;
    --text: #e8eaf0;
    --muted: rgba(232,234,240,0.45);
    --glow: rgba(126,184,247,0.18);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    overflow: hidden;
  }

  /* ── deep space background ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 30%, rgba(20,40,100,0.35) 0%, transparent 70%),
      radial-gradient(ellipse 60% 50% at 80% 70%, rgba(60,10,80,0.25) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  canvas {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    display: block;
    cursor: grab;
    z-index: 1;
  }
  canvas:active { cursor: grabbing; }

  /* ── header ── */
  header {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 10;
    padding: 18px 28px;
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(to bottom, rgba(5,8,16,0.85), transparent);
    pointer-events: none;
  }
  header .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    letter-spacing: 0.06em;
    color: var(--accent);
    pointer-events: all;
    text-decoration: none;
    opacity: 0.9;
  }
  header .title-block { text-align: right; }
  header h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text);
    opacity: 0.7;
  }
  header p {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    margin-top: 2px;
  }

  /* ── control panel ── */
  #panel {
    position: fixed;
    bottom: 28px; left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    background: var(--panel);
    border: 1px solid var(--border);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 18px;
    padding: 18px 24px 16px;
    width: min(96vw, 720px);
    box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03);
  }

  .panel-row {
    display: flex;
    gap: 14px;
    align-items: flex-end;
    flex-wrap: wrap;
  }

  .ctrl {
    display: flex;
    flex-direction: column;
    gap: 5px;
    flex: 1;
    min-width: 90px;
  }
  .ctrl label {
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .ctrl .val {
    font-size: 0.72rem;
    color: var(--accent);
    letter-spacing: 0.04em;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 3px;
    background: rgba(255,255,255,0.12);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 13px; height: 13px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--glow);
    cursor: pointer;
    transition: transform 0.15s;
  }
  input[type=range]:hover::-webkit-slider-thumb { transform: scale(1.25); }

  select {
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    padding: 5px 8px;
    border-radius: 7px;
    outline: none;
    cursor: pointer;
    width: 100%;
  }
  select option { background: #0d1220; }

  .divider {
    width: 1px;
    height: 50px;
    background: var(--border);
    align-self: center;
    flex: 0;
    min-width: 1px;
  }

  .btn-group {
    display: flex;
    flex-direction: column;
    gap: 7px;
    min-width: 80px;
  }

  button {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 14px;
    cursor: pointer;
    transition: all 0.18s;
    background: rgba(255,255,255,0.05);
    color: var(--text);
  }
  button:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }

  #btnStart {
    background: rgba(126,184,247,0.15);
    border-color: rgba(126,184,247,0.35);
    color: var(--accent);
  }
  #btnStart:hover { background: rgba(126,184,247,0.28); }
  #btnStart.running {
    background: rgba(247,201,126,0.12);
    border-color: rgba(247,201,126,0.35);
    color: var(--accent2);
  }

  /* ── hint ── */
  #hint {
    position: fixed;
    top: 70px; left: 50%;
    transform: translateX(-50%);
    z-index: 9;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    opacity: 1;
    transition: opacity 1.5s;
    pointer-events: none;
  }
  #hint.hide { opacity: 0; }

  /* ── stats ── */
  #stats {
    position: fixed;
    top: 70px; right: 24px;
    z-index: 9;
    font-size: 0.6rem;
    line-height: 1.7;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-align: right;
  }
  #stats span { color: var(--accent); }
</style>
</head>
<body>

<header>
  <a class="logo" href="https://mount109114.github.io/funzone/particles@intro/fun.html">← Fun Lab</a>
  <div class="title-block">
    <h1>Lorenz Attractor</h1>
    <p>Chaos Theory · Butterfly Effect</p>
  </div>
</header>

<div id="hint">drag to rotate &nbsp;·&nbsp; scroll to zoom</div>

<div id="stats">
  σ <span id="sv">10.0</span> &nbsp; ρ <span id="rv">28.0</span> &nbsp; β <span id="bv">2.67</span><br>
  pts <span id="pv">0</span>
</div>

<canvas id="c"></canvas>

<div id="panel">
  <div class="panel-row">

    <div class="ctrl">
      <label>σ Sigma <span class="val" id="sigmaVal">10.0</span></label>
      <input type="range" id="sigma" min="1" max="20" step="0.1" value="10"/>
    </div>

    <div class="ctrl">
      <label>ρ Rho <span class="val" id="rhoVal">28.0</span></label>
      <input type="range" id="rho" min="10" max="50" step="0.5" value="28"/>
    </div>

    <div class="ctrl">
      <label>β Beta <span class="val" id="betaVal">2.67</span></label>
      <input type="range" id="beta" min="0.5" max="6" step="0.01" value="2.667"/>
    </div>

    <div class="divider"></div>

    <div class="ctrl">
      <label>Speed <span class="val" id="speedVal">1.0×</span></label>
      <input type="range" id="speed" min="0.1" max="4" step="0.1" value="1"/>
    </div>

    <div class="ctrl">
      <label>Trail <span class="val" id="trailVal">4000</span></label>
      <input type="range" id="trail" min="200" max="10000" step="100" value="4000"/>
    </div>

    <div class="ctrl">
      <label>Color Mode</label>
      <select id="colorMode">
        <option value="velocity">Velocity</option>
        <option value="height">Height</option>
        <option value="hueshift">Hue Shift</option>
        <option value="mono">Monochrome</option>
      </select>
    </div>

    <div class="divider"></div>

    <div class="btn-group">
      <button id="btnStart" class="running">⏸ Pause</button>
      <button id="btnReset">↺ Reset</button>
    </div>

  </div>
</div>

<script>
// ── canvas setup ──
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── Lorenz params ──
let sigma = 10, rho = 28, beta = 8/3;
let speed = 1;
let maxPts = 4000;
let colorMode = 'velocity';
let running = true;

// ── state ──
let points = [];  // {x,y,z}
let x = 0.1, y = 0, z = 0;
const dt = 0.005;

// ── camera ──
let rotX = 0.3, rotY = -0.4;
let zoom = 9;
let dragging = false, lastMX = 0, lastMY = 0;
let autoRotate = true;

// ── hue state ──
let hueOffset = 0;

// ── project 3D → 2D ──
function project(px, py, pz) {
  // rotate around Y
  const cosY = Math.cos(rotY), sinY = Math.sin(rotY);
  const x1 = px * cosY - pz * sinY;
  const z1 = px * sinY + pz * cosY;
  // rotate around X
  const cosX = Math.cos(rotX), sinX = Math.sin(rotX);
  const y2 = py * cosX - z1 * sinX;
  const z2 = py * sinX + z1 * cosX;
  const fov = 600;
  const d = fov / (fov + z2 * zoom * 0.5);
  return {
    sx: canvas.width / 2 + x1 * zoom * d,
    sy: canvas.height / 2 + y2 * zoom * d,
    depth: z2
  };
}

// ── color functions ──
function velColor(i) {
  if (i < 1 || i >= points.length) return `rgba(126,184,247,0.5)`;
  const a = points[i-1], b = points[i];
  const dx = b.x-a.x, dy = b.y-a.y, dz = b.z-a.z;
  const v = Math.sqrt(dx*dx+dy*dy+dz*dz) * 80;
  const t = Math.min(v, 1);
  const r = Math.round(126 + t*(247-126));
  const g = Math.round(184 + t*(100-184));
  const bl = Math.round(247 + t*(80-247));
  return `rgb(${r},${g},${bl})`;
}

function heightColor(i) {
  const z = points[i].z;
  const t = (z + 30) / 65;
  const h = 200 + t * 160;
  return `hsl(${h},80%,65%)`;
}

function hueshiftColor(i) {
  const h = (hueOffset + i * 0.05) % 360;
  return `hsl(${h},80%,65%)`;
}

function monoColor(i, alpha) {
  const a = alpha !== undefined ? alpha : 0.7;
  return `rgba(220,230,255,${a})`;
}

function getColor(i, alpha) {
  if (colorMode === 'velocity') return velColor(i);
  if (colorMode === 'height') return heightColor(i);
  if (colorMode === 'hueshift') return hueshiftColor(i);
  return monoColor(i, alpha);
}

// ── step Lorenz ──
function stepLorenz(steps) {
  for (let s = 0; s < steps; s++) {
    const dx = sigma * (y - x);
    const dy = x * (rho - z) - y;
    const dz = x * y - beta * z;
    x += dx * dt;
    y += dy * dt;
    z += dz * dt;
    points.push({x, y, z});
    if (points.length > maxPts) points.shift();
  }
}

// ── draw ──
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (points.length < 2) return;

  const n = points.length;

  // draw trail segments
  for (let i = 1; i < n; i++) {
    const age = i / n;
    const alpha = Math.pow(age, 0.6) * 0.85;
    const a = project(points[i-1].x, points[i-1].y, points[i-1].z);
    const b = project(points[i].x, points[i].y, points[i].z);

    ctx.beginPath();
    ctx.moveTo(a.sx, a.sy);
    ctx.lineTo(b.sx, b.sy);

    const lw = 0.6 + age * 1.2;
    ctx.lineWidth = lw;

    const col = getColor(i, alpha);
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = col;
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // glowing head dot
  const head = points[n-1];
  const hp = project(head.x, head.y, head.z);
  const grad = ctx.createRadialGradient(hp.sx, hp.sy, 0, hp.sx, hp.sy, 10);
  grad.addColorStop(0, 'rgba(255,255,255,0.95)');
  grad.addColorStop(0.3, 'rgba(180,220,255,0.6)');
  grad.addColorStop(1, 'rgba(126,184,247,0)');
  ctx.beginPath();
  ctx.arc(hp.sx, hp.sy, 10, 0, Math.PI*2);
  ctx.fillStyle = grad;
  ctx.fill();

  // solid dot center
  ctx.beginPath();
  ctx.arc(hp.sx, hp.sy, 2.5, 0, Math.PI*2);
  ctx.fillStyle = '#fff';
  ctx.fill();
}

// ── animation loop ──
let last = performance.now();
function loop(now) {
  requestAnimationFrame(loop);
  const dt_frame = Math.min((now - last) / 1000, 0.05);
  last = now;

  if (running) {
    const steps = Math.round(speed * 3);
    stepLorenz(steps);
    hueOffset += 0.3 * speed;
  }

  if (autoRotate && !dragging) {
    rotY += 0.002;
  }

  draw();
  updateStats();
}

function updateStats() {
  document.getElementById('sv').textContent = sigma.toFixed(1);
  document.getElementById('rv').textContent = rho.toFixed(1);
  document.getElementById('bv').textContent = beta.toFixed(2);
  document.getElementById('pv').textContent = points.length;
}

requestAnimationFrame(loop);

// ── controls ──
function bind(id, valId, suffix, cb) {
  const el = document.getElementById(id);
  const vEl = document.getElementById(valId);
  el.addEventListener('input', () => {
    vEl.textContent = parseFloat(el.value).toFixed(2).replace(/\.?0+$/, '') + (suffix||'');
    cb(parseFloat(el.value));
  });
}

bind('sigma', 'sigmaVal', '', v => { sigma = v; reset(); });
bind('rho',   'rhoVal',   '', v => { rho = v;   reset(); });
bind('beta',  'betaVal',  '', v => { beta = v;  reset(); });
bind('speed', 'speedVal', '×', v => speed = v);
bind('trail', 'trailVal', '', v => { maxPts = v; });

document.getElementById('colorMode').addEventListener('change', e => {
  colorMode = e.target.value;
});

const btnStart = document.getElementById('btnStart');
btnStart.addEventListener('click', () => {
  running = !running;
  btnStart.textContent = running ? '⏸ Pause' : '▶ Start';
  btnStart.classList.toggle('running', running);
});

document.getElementById('btnReset').addEventListener('click', reset);

function reset() {
  points = [];
  x = 0.1 + (Math.random()-0.5)*0.01;
  y = 0;
  z = 0;
}

// ── mouse drag ──
canvas.addEventListener('mousedown', e => {
  dragging = true; autoRotate = false;
  lastMX = e.clientX; lastMY = e.clientY;
});
window.addEventListener('mouseup', () => { dragging = false; });
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  rotY += (e.clientX - lastMX) * 0.007;
  rotX += (e.clientY - lastMY) * 0.007;
  lastMX = e.clientX; lastMY = e.clientY;
});

// ── touch drag ──
canvas.addEventListener('touchstart', e => {
  dragging = true; autoRotate = false;
  lastMX = e.touches[0].clientX; lastMY = e.touches[0].clientY;
}, {passive: true});
window.addEventListener('touchend', () => { dragging = false; });
window.addEventListener('touchmove', e => {
  if (!dragging) return;
  rotY += (e.touches[0].clientX - lastMX) * 0.007;
  rotX += (e.touches[0].clientY - lastMY) * 0.007;
  lastMX = e.touches[0].clientX; lastMY = e.touches[0].clientY;
}, {passive: true});

// ── scroll zoom ──
canvas.addEventListener('wheel', e => {
  zoom *= e.deltaY > 0 ? 0.93 : 1.07;
  zoom = Math.max(3, Math.min(30, zoom));
  e.preventDefault();
}, {passive: false});

// ── hide hint after 4s ──
setTimeout(() => document.getElementById('hint').classList.add('hide'), 4000);

// ── double click to re-enable auto-rotate ──
canvas.addEventListener('dblclick', () => { autoRotate = true; });
</script>
</body>
</html>
